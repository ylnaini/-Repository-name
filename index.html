<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问问伊蕾娜吧</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #f5f6fa; 
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }
        .ask-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(161, 140, 209, 0.4);
            cursor: pointer;
            z-index: 10;
        }
        /* 增加一个加载中变灰的样式 */
        .ask-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
        .img-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <!-- 默认让按钮处于禁用状态，显示加载中 -->
    <button class="ask-btn" id="startBtn" onclick="startMagic()" disabled>魔力加载中...</button>

    <div class="img-container" id="container">
        <img id="slideshow" src="./1.jpg">
    </div>

    <script>
        const images = [
            "./1.jpg",
            "./2.jpg",
            "./3.jpg",
            "./4.jpg"
        ];

        const btn = document.getElementById('startBtn');
        const container = document.getElementById('container');
        const imgElement = document.getElementById('slideshow');
        let timer = null;
        let loadedCount = 0;

        // 精准监控每张图片的下载进度
        images.forEach(src => {
            const img = new Image();
            img.onload = function() {
                loadedCount++;
                // 当 4 张图片全部下载到手机内存后，才激活按钮
                if (loadedCount === images.length) {
                    btn.innerText = "问问伊蕾娜吧";
                    btn.disabled = false;
                }
            };
            img.onerror = function() {
                // 如果某张图加载失败，也算过去，避免网页完全卡死
                loadedCount++;
                if (loadedCount === images.length) {
                    btn.innerText = "问问伊蕾娜吧";
                    btn.disabled = false;
                }
            };
            img.src = src;
        });

        function startMagic() {
            btn.style.display = 'none';
            container.style.display = 'flex';
            
            let duration = 3000; 
            let speed = 100; // 100毫秒切一次，完美的疯狂闪烁速度
            let elapsed = 0;

            timer = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * images.length);
                imgElement.src = images[randomIndex];
                elapsed += speed;

                if (elapsed >= duration) {
                    clearInterval(timer);
                    imgElement.onclick = function() {
                        btn.style.display = 'block';
                        container.style.display = 'none';
                        imgElement.onclick = null;
                    };
                }
            }, speed);
        }
    </script>
</body>
</html>
