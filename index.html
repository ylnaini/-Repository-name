<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问问伊蕾娜吧</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #f5f6fa; 
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }
        .ask-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(161, 140, 209, 0.4);
            cursor: pointer;
            z-index: 10;
        }
        .img-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <button class="ask-btn" id="startBtn" onclick="startMagic()">问问伊蕾娜吧</button>

    <div class="img-container" id="container">
        <img id="slideshow" src="">
    </div>

    <script>
        // 请把下面的链接替换成你实际的水果伊蕾娜图片链接
        const images = [
            "https://share.gemini.google/XLdOLTtyH2ud",
            "https://share.gemini.google/fjH1OWIzwAuw",
            "https://share.gemini.google/59w1ww2B3pHq",
            "https://share.gemini.google/MQmPm0EUjCaH"
        ];

        const btn = document.getElementById('startBtn');
        const container = document.getElementById('container');
        const imgElement = document.getElementById('slideshow');
        let timer = null;

        function startMagic() {
            btn.style.display = 'none';
            container.style.display = 'flex';
            let duration = 3000; 
            let speed = 80;      
            let elapsed = 0;

            timer = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * images.length);
                imgElement.src = images[randomIndex];
                elapsed += speed;

                if (elapsed >= duration) {
                    clearInterval(timer);
                    imgElement.onclick = function() {
                        btn.style.display = 'block';
                        container.style.display = 'none';
                        imgElement.onclick = null;
                    };
                }
            }, speed);
        }
    </script>
</body>
</html>
